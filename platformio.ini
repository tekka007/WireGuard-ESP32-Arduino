; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DCONFIG_ARDUHAL_LOG_COLORS
  ; Uncomment for debugging WireGuard
  ; -DWG_DEBUG=1
  ; -DCONFIG_LOG_MAXIMUM_EQUENTIAL=10
  ; Uncomment for hardware crypto (ESP32 V3+)
  ; -DCONFIG_WIREGUARD_USE_HW_CRYPTO=1
  ; Uncomment for IPv6 support (if implemented)
  ; -DWG_IPV6_ENABLED=1
  ; Uncomment for verbose WireGuard logging
  ; -DWG_LOG_LEVEL=ESP_LOG_DEBUG
src_filter = +<*> -<crypto/esp_hw/> -<WireGuardExt.cpp>
test_build_src = false
lib_deps =
  ; Add dependencies here if needed

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  ; Enable hardware crypto acceleration
  -DCONFIG_WIREGUARD_USE_HW_CRYPTO=1
  -DCONFIG_WIREGUARD_ENABLE_NVS=1

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DCONFIG_WIREGUARD_ENABLE_NVS=1
src_filter = +<*> -<crypto/esp_hw/> -<WireGuardExt.cpp>

; Test environments
[env:test]
platform = native
test_framework = unity
build_flags =
  -std=gnu++17

[platformio]
; Enable auto-upload on save (optional)
; auto_upload = true

; Data directory for persistent storage (for examples using NVS)
; data_dir = data

; Default environments for testing
; default_envs = esp32dev
